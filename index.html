<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI APK Builder Pro</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --surface: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }
        
        * { box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; }
        body { background-color: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { background-color: var(--surface); padding: 2rem; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 100%; max-width: 600px; }
        h1 { text-align: center; margin-top: 0; font-size: 1.8rem; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--text-muted); }
        input[type="text"], textarea { width: 100%; padding: 0.75rem; background-color: var(--bg); border: 1px solid #334155; border-radius: 8px; color: var(--text); font-size: 1rem; transition: border-color 0.3s ease; }
        input[type="text"]:focus, textarea:focus { outline: none; border-color: var(--primary); }
        textarea { resize: vertical; min-height: 120px; }
        .btn-group { display: flex; gap: 10px; margin-top: 1rem; }
        button { flex: 1; padding: 0.75rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: background-color 0.3s ease, transform 0.1s ease; }
        button:active { transform: scale(0.98); }
        .btn-ai { background-color: #8b5cf6; color: white; }
        .btn-ai:hover { background-color: #7c3aed; }
        .btn-build { background-color: var(--primary); color: white; }
        .btn-build:hover { background-color: var(--primary-hover); }
        #statusBox { margin-top: 1.5rem; padding: 1rem; border-radius: 8px; background-color: rgba(0,0,0,0.2); border: 1px dashed #334155; font-family: monospace; font-size: 0.9rem; color: #10b981; display: none; word-wrap: break-word;}
    </style>
</head>
<body>

    <div class="container">
        <h1>دروستکەری APK بە زیرەکی دەستکرد</h1>
        
        <div class="form-group">
            <label for="appName">ناوی ئەپڵیکەیشنەکە:</label>
            <input type="text" id="appName" placeholder="بۆ نموونە: MyKurdApp">
        </div>

        <div class="form-group">
            <label for="appSource">بەستەری وێبسایت (URL):</label>
            <textarea id="appSource" placeholder="لینکی ئەو وێبسایتە دابنێ کە دەتەوێت ببێتە ئەپی WebView..."></textarea>
        </div>

        <div class="btn-group">
            <button class="btn-ai" onclick="enhanceWithAI()">✨ باشترکردن بە AI</button>
            <button class="btn-build" onclick="triggerBuild()">🚀 ناردن بۆ سێرڤەر</button>
        </div>

        <div id="statusBox"></div>
    </div>

    <script>
        // --- ڕێکخستنەکانی سێرڤەر ---
        const GITHUB_USERNAME = 'KristalTec'; // ناوی ئەکاونتەکەت
        const GITHUB_REPO = 'apk'; // ناوی ڕیپۆزیتۆرییەکەت (پێدەچێت ئەمە بێت)
        const GITHUB_TOKEN = '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'; // تۆکنەکەت لێرە جێگیر کرا
        const WORKFLOW_FILENAME = 'build.yml'; 

        function showStatus(message, isError = false) {
            const statusBox = document.getElementById('statusBox');
            statusBox.style.display = 'block';
            statusBox.style.color = isError ? '#ef4444' : '#10b981';
            statusBox.innerHTML += `> ${message}<br>`;
        }

        function enhanceWithAI() {
            const source = document.getElementById('appSource').value;
            if(!source) {
                showStatus("تکایە سەرەتا لینکێک دابنێ.", true);
                return;
            }
            showStatus("AI: لینکەکە پشکنینی بۆ کرا و ئامادەیە بۆ وێب-ڤیوو (WebView).");
        }

        async function triggerBuild() {
            const appName = document.getElementById('appName').value;
            const appSource = document.getElementById('appSource').value;

            if(!appName || !appSource) {
                showStatus("تکایە داتاکان پڕبکەرەوە.", true);
                return;
            }

            document.getElementById('statusBox').innerHTML = '';
            showStatus(`پەیوەندی کردن بە سێرڤەری GitHub Actions بۆ ئەپی: ${appName}...`);

            try {
                // ناردنی داواکاری بۆ سێرڤەری گیت هاب
                const response = await fetch(`https://api.github.com/repos/${GITHUB_USERNAME}/${GITHUB_REPO}/actions/workflows/${WORKFLOW_FILENAME}/dispatches`, {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/vnd.github.v3+json',
                        'Authorization': `Bearer ${GITHUB_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        ref: 'main', 
                        inputs: {
                            appName: appName,
                            appUrl: appSource
                        }
                    })
                });

                if (response.ok) {
                    showStatus("✅ داواکارییەکە بە سەرکەوتوویی نێردرا بۆ سێرڤەر!");
                    showStatus("سێرڤەر ئێستا خەریکی کۆمپایڵکردنی WebView ـەکەیە...");
                    showStatus("دوای چەند خولەکێک بڕۆ ناو بەشی 'Actions' لە گیت هاب بۆ داگرتنی APK ـیەکە.");
                } else {
                    const errorData = await response.json();
                    showStatus(`❌ کێشەیەک ڕوویدا: ${errorData.message}`, true);
                }
            } catch (error) {
                showStatus(`❌ هەڵەی پەیوەندی: ${error.message}`, true);
            }
        }
    </script>
</body>
</html>
